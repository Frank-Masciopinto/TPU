<div class="pdp-shipping-calc" data-pdp-shipping-calc>
    <div class="pdp-shipping-calc__header">
        <span class="pdp-shipping-calc__icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>
        </span>
        <span class="pdp-shipping-calc__title" data-calc-title>Calculate Shipping</span>
        <button type="button" class="pdp-shipping-calc__edit-btn" data-calc-edit
                aria-label="Edit shipping location" style="display:none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
        </button>
    </div>

    <div class="pdp-shipping-calc__form" data-calc-form style="display:none;">
        <div class="pdp-shipping-calc__fields">
            <div class="pdp-shipping-calc__field pdp-shipping-calc__field--state">
                <select class="pdp-shipping-calc__state form-select" data-calc-state
                        aria-label="Select state">
                    <option value="">State</option>
                </select>
            </div>
            <div class="pdp-shipping-calc__field pdp-shipping-calc__field--zip">
                <input type="text"
                       class="pdp-shipping-calc__zip form-input"
                       data-calc-zip
                       inputmode="numeric" pattern="[0-9]*"
                       placeholder="ZIP Code" maxlength="5"
                       aria-label="ZIP code">
            </div>
            <button type="button"
                    class="pdp-shipping-calc__submit button button--small button--primary"
                    data-calc-submit disabled>
                <span data-calc-btn-text>Get Rates</span>
                <svg data-calc-btn-spinner class="pdp-shipping-calc__spinner" style="display:none;"
                     width="16" height="16" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"
                            stroke="currentColor" stroke-width="2"
                            fill="none" stroke-dasharray="60" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="pdp-shipping-calc__error" data-calc-error style="display:none;"></div>

    <div class="pdp-shipping-calc__loading" data-calc-loading style="display:none;">
        <svg class="pdp-shipping-calc__spinner" width="20" height="20" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"
                    stroke="currentColor" stroke-width="2"
                    fill="none" stroke-dasharray="60" stroke-linecap="round"/>
        </svg>
        <span>Calculating rates&hellip;</span>
    </div>

    <div class="pdp-shipping-calc__results" data-calc-results style="display:none;"></div>

    <div class="pdp-shipping-calc__empty" data-calc-empty style="display:none;">
        No shipping options available for this location.
    </div>
</div>
